<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adora Wu | WLSA Basketball Profile</title>
    <style>
        :root {
            --nba-blue: #051c2c; /* Deep Navy */
            --nba-silver: #b0b7be;
            --win-green: #007a33;
            --loss-red: #c8102e;
            --bg-light: #f4f4f4;
            --text-dark: #333;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
        }

        .nba-dashboard {
            width: 100%;
            max-width: 900px;
            background: #fff;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-top: 6px solid var(--nba-silver);
        }

        /* --- 1. Header (Identity) --- */
        .player-card-header {
            background: var(--nba-blue);
            color: white;
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-identity { display: flex; align-items: center; }

        .jersey-num {
            font-size: 90px;
            font-weight: 900;
            line-height: 1;
            opacity: 0.3;
            margin-right: 25px;
            font-style: italic;
            font-family: 'Arial Black', sans-serif;
        }

        .player-name {
            font-size: 38px;
            margin: 0;
            letter-spacing: -1px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .team-name {
            color: var(--nba-silver);
            margin: 5px 0 0 0;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 14px;
        }

        /* --- 2. Season Averages (Calculated automatically from below) --- */
        /* Currently based on one game log */
        .season-avg { display: flex; gap: 30px; text-align: center;}
        
        .avg-box .label {
            display: block;
            font-size: 12px;
            color: var(--nba-silver);
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .avg-box .value {
            font-size: 36px;
            font-weight: 800;
        }

        /* --- 3. Game Log Table --- */
        .game-log-container { padding: 30px; }
        
        .section-title {
            font-size: 20px;
            text-transform: uppercase;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--text-dark);
            padding-bottom: 10px;
            font-weight: 700;
        }

        .nba-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .nba-table th {
            text-align: left;
            padding: 12px;
            background: var(--bg-light);
            color: #666;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 2px solid #ddd;
        }

        .nba-table td {
            padding: 18px 12px;
            border-bottom: 1px solid #eee;
            font-weight: 600;
        }

        /* Highlights for W/L and High Scores */
        .win-status { color: var(--win-green); font-weight: 800;}
        .loss-status { color: var(--loss-red); font-weight: 800;}
        .high-score { background-color: #fff9c4; padding: 2px 5px; border-radius: 3px;}

        /* --- 4. Responsive Design --- */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .player-card-header { flex-direction: column; text-align: center; padding: 30px;}
            .jersey-num { margin-right: 0; margin-bottom: 10px; font-size: 70px; }
            .season-avg { margin-top: 30px; gap: 20px;}
            .avg-box .value { font-size: 28px; }
            .nba-table { font-size: 12px; display: block; overflow-x: auto;}
        }
    </style>
</head>
<body>

    <div class="nba-dashboard">
        <div class="player-card-header">
            <div class="player-identity">
                <div class="jersey-num">08</div>
                <div class="player-meta">
                    <h1 class="player-name">Adora Wu</h1>
                    <p class="team-name">WLSA Women's Basketball</p>
                </div>
            </div>
            <div class="season-avg">
                <div class="avg-box">
                    <span class="label">PPG</span>
                    <span class="value">17.0</span>
                </div>
                <div class="avg-box">
                    <span class="label">RPG</span>
                    <span class="value">4.0</span>
                </div>
                <div class="avg-box">
                    <span class="label">SPG</span>
                    <span class="value">5.0</span>
                </div>
            </div>
        </div>

        <div class="game-log-container">
            <h2 class="section-title">2025-26 Game Log</h2>
            <table class="nba-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Opponent</th>
                        <th>Result</th>
                        <th>PTS</th>
                        <th>REB</th>
                        <th>AST</th>
                        <th>STL</th>
                        <th>FLS</th> </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Mar 23, 2026 (Mon)</td>
                        <td>Opponent TBD</td> <td class="win-status">W 40-TBD</td> <td><span class="high-score">17</span></td> <td>4</td>
                        <td>0</td>
                        <td>5</td>
                        <td>1</td>
                    </tr>
                    </tbody>
            </table>
        </div>
    </div>

</body>
</html>
