<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adora's Music Station | Curation & Appreciation</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --accent-gold: #c5a059;
            --vinyl-black: #121212;
            --border-light: #eeeeee;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            margin-bottom: 80px;
        }

        .header-title {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 5px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--text-main);
            display: inline-block;
            padding-bottom: 10px;
        }

        /* --- SECTION LABELS --- */
        .section-label {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-gold);
            margin-bottom: 30px;
            display: block;
        }

        /* --- 1. ROTATING VINYL SECTION --- */
        .vinyl-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 100px;
        }

        .vinyl-record {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #333 0%, #050505 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 10px solid #1a1a1a;
            /* ROTATION ANIMATION */
            animation: spinVinyl 12s linear infinite;
        }

        /* Vinyl Grooves Effect */
        .vinyl-record::after {
            content: "";
            position: absolute;
            width: 85%;
            height: 85%;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* EDIT: THIS IS THE CENTER ALBUM ART */
        .vinyl-center-art {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
            z-index: 5;
        }

        @keyframes spinVinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinning-caption {
            margin-top: 25px;
            font-style: italic;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* --- 2. WEEKLY RECOMMENDATION --- */
        .weekly-recommendation {
            margin-bottom: 100px;
        }
